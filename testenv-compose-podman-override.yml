# Podman compatibility override for testenv-compose.yml.
# Apply with: podman compose -f testenv-compose.yml -f testenv-compose-podman-override.yml up -d
#
# Fixes for podman:
#   1. Removes Docker-specific driver_opts (bridge.name, MTU) — podman does not support them
#   2. Keeps the named network and IPAM subnet (required for ion-agent DNS resolution)

networks:
  testenv:
    name: testenv
    # driver_opts removed — not supported by podman
    # IPAM config preserved — ion-agent3 requires subnet 10.5.0.0/16 for static IPs
