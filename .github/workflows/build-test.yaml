name: Build and run tests
on:
  push:
    branches:
    - main
  pull_request: {} # any target
  schedule:
    - cron: '0 0 * * 0' # weekly

jobs:
  podman-checkout-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ctrmgr: ['docker', 'podman']
    name: Checkout Test (${{matrix.ctrmgr}})
    env:
      AUTHNZ_EMU: "demo"
      COMPOSE_PROFILES: "full"
      ANMS_COMPOSE_OPTS: "-f docker-compose.yml"
      TESTENV_COMPOSE_OPTS: "-f testenv-compose.yml"
      DOCKER_CMD: ${{matrix.ctrmgr}}
      AUTHNZ_PORT: 8084
      AUTHNZ_HTTPS_PORT: 8443
    steps:
      - name: Start Container Service
        if: ${{matrix.ctrmgr == 'podman'}}
        run: |
          systemctl --user start podman.socket
          systemctl --user enable podman.socket
          export DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock
      - name: Versions
        run: |
          ${DOCKER_CMD} -v
          ${DOCKER_CMD} compose -v
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Tag name env
        run: |
          DOCKER_IMAGE_TAG=${{ github.sha }}
          echo "DOCKER_IMAGE_TAG=${DOCKER_IMAGE_TAG}" >> $GITHUB_ENV
      - name: Build ANMS
        run: ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} build
      - name: Build Agents
        run: ${DOCKER_CMD} compose ${TESTENV_COMPOSE_OPTS} build
      - name: Build Volume
        run: |
          ./create_volume.sh ./puppet/modules/apl_test/files/anms/tls
          sudo mkdir /run/anms
      - name: Pull Images
        run: ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} pull --ignore-buildable
      - name: Start
        run: |
          # testenv started before
          ${DOCKER_CMD} compose ${TESTENV_COMPOSE_OPTS} up -d --force-recreate
          ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} up -d --force-recreate
      - name: Wait for containers to become healthy
        run: |
              set -e

              TIMEOUT=600
              INTERVAL=5
              ELAPSED=0

              echo "Waiting for containers to become healthy (timeout: ${TIMEOUT}s)..."

              while true; do
              # Get all running container IDs
              CONTAINERS=$(${DOCKER_CMD} ps -q)

              if [ -z "$CONTAINERS" ]; then
              echo "No running containers found yet..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
              fi

              # Check health status (ignore containers without healthchecks)
              UNHEALTHY=$(${DOCKER_CMD} inspect \
              --format '{{if .State.Health}}{{.Name}} {{.State.Health.Status}}{{end}}' \
              $CONTAINERS | grep -v ' healthy' || true)

              if [ -z "$UNHEALTHY" ]; then
              echo "All containers are healthy ✅"
              break
              fi

              echo "Still waiting on:"
              echo "$UNHEALTHY"
              echo "---"

              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))

              if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "ERROR: Timed out waiting for healthy containers"
              ${DOCKER_CMD} ps
              
              echo ""

              echo "=== Failing container logs ==="

              # Loop through failing containers and dump logs
              echo "$UNHEALTHY" | while read -r line; do
              NAME=$(echo "$line" | awk '{print $1}' | sed 's#^/##')

              echo ""
              echo "----- Logs for $NAME -----"
              
              # Try compose logs first (nicer formatting)
              ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} logs --no-color "$NAME" || \
              ${DOCKER_CMD} logs "$NAME" || \
              echo "Unable to retrieve logs for $NAME"
              done
              exit 1
              fi
              done
      - name: Status
        if: always()
        run: |
          ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} ps
          ${DOCKER_CMD} compose ${TESTENV_COMPOSE_OPTS} ps
          for BADSTATUS in stopped restarting; do
            ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} ps --services --filter status=${BADSTATUS} | tee -a /tmp/notgood
          done
          # Show hints at what may be wrong
          for SERVNAME in $(cat /tmp/notgood); do
            ${DOCKER_CMD} compose ${ANMS_COMPOSE_OPTS} logs --tail 50 ${SERVNAME}
          done
          # Fail if any names are in the file
          ! grep '[^[:space:]]' /tmp/notgood
      - name: Test
        run: ./checkout-test/run.sh
      - name: Stop
        if: always()
        run: |
          # testenv stopped after
          for OPTS_NAME in ANMS_COMPOSE_OPTS TESTENV_COMPOSE_OPTS; do
            ${DOCKER_CMD} compose ${!OPTS_NAME} down --remove-orphans
          done
