name: Test aricodec
on:
  push:
    paths:
      - .github/workflows/aricodec.yaml
      - deps/**
      - aricodec/**

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set ENV
        run: ./update_env.sh
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip3 install deps/dtnma-ace
      - name: Install flake8
        working-directory: aricodec
        run: pip3 install -e '.[flake8]'
      - name: Run flake8
        working-directory: aricodec
        run: |
          FAIL_SRC=0
          flake8 . || FAIL_SRC=$?
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set ENV
        run: ./update_env.sh
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip3 install deps/dtnma-ace
      - name: Install ruff
        working-directory: aricodec
        run: pip3 install -e '.[ruff]'
      - name: Run ruff check
        working-directory: aricodec
        run: |
          FAIL_SRC=0
          ruff check . || FAIL_SRC=$?
      - name: Run ruff format --check
        working-directory: aricodec
        run: |
          FAIL_SRC=0
          ruff format --check . || FAIL_SRC=$?
