<div>
  <h5>Reports sent:</h5>

  <!-- Loading spinner -->
  @if (loading) {
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
  }

  <div class="select-max-width mb-3">
    <select class="form-select" [(ngModel)]="selected" (change)="onReportSelect()"
      [ngModelOptions]="{ standalone: true }">
      <option [ngValue]="undefined">-- Select a report --</option>
      @for (rpt of rptts; track rpt) {
      <option [ngValue]="rpt">
        {{ rpt.ari }}
      </option>
      }
    </select>
  </div>

  <!-- Tables -->
 @for (_ of tableItems; track _; let index = $index) {
      <div class="spacing-table">
        <table class="table table-bordered">
          <thead class="">
          <tr>
            @for (header of tableHeaders[index]; track header) {
              <th>
                {{ header }}
              </th>
            }
          </tr>
          </thead>
          <tbody>
            @for (row of tableItems[index]; track row) {
              <tr>
                <!-- {{ row }}   -->
                @for (cell of row; track cell) {
                  <td>
                    {{ cell }}
                  </td>
                }
              </tr>
            }
          </tbody>
        </table>
      </div>
  }
</div>
