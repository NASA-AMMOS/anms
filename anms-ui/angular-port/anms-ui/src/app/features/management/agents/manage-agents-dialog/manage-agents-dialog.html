<div class="d-flex justify-content-between">
  <div>
    <h2 mat-dialog-title>Manage Agents</h2>
  </div>
  <div class="pe-3 pt-3">
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="modal"
      aria-label="Close"
      (click)="close()"
    ></button>
  </div>
</div>
<div mat-dialog-content>

  <section class="selected-agents-section">
    <div class="selected-agents-header">
      {{ data.agents.length }} selected agent{{ data.agents.length === 1 ? '' : 's' }}
    </div>

    <div class="selected-agents-chip-container">
      <mat-chip-set aria-label="Selected agents">
        @for (agent of data.agents; track agent.registered_agents_id) {
          <mat-chip>
            {{ agent.agent_endpoint_uri }}
          </mat-chip>
        }
      </mat-chip-set>
    </div>
  </section>

  <mat-divider></mat-divider>

  <section class="command-builder-section">
    <app-ari-command-builder
      [initialMode]="data.cborCommands?.length ? 'cbor' : 'builder'"
      [initialCborCommands]="data.cborCommands ?? []"
      (commandReady)="handleCommand($event)">
    </app-ari-command-builder>
  </section>

</div>
