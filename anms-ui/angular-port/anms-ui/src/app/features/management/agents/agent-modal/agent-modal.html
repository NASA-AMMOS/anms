<div class="d-flex justify-content-between">
  <div>
    <h2 mat-dialog-title>Agent Details</h2>
  </div>
  <div class="pe-3 pt-3">
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="modal"
      aria-label="Close"
      (click)="close()"
    ></button>
  </div>
</div>

@if (agentInfo) {
  <mat-dialog-content>
    <div class="agent-info">
      <div>
        Agent:
        <span class="badge badge-primary">
        {{ agentInfo.agent_endpoint_uri }}
      </span>
      </div>

      <div>
        Registered Agents ID:
        <span class="badge badge-primary">
        {{ agentInfo.registered_agents_id }}
      </span>
      </div>

      <div>
        First Registered:
        <span class="badge badge-primary">
        {{ agentInfo.first_registered }}
      </span>
      </div>

      <div>
        Last Registered:
        <span class="badge badge-primary">
        {{ agentInfo.last_registered }}
      </span>
      </div>
    </div>

    <app-reports
      [agentName]="agentInfo.agent_endpoint_uri"
      [rptts]="this.agentsService.getRptt()"
      [registeredAgentsId]="agentInfo.registered_agents_id">
    </app-reports>

    <app-crud
      [agentId]="agentInfo.registered_agents_id"
      [operations]="this.agentsService.getOperations()">
    </app-crud>
  </mat-dialog-content>
}

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="close()">
    OK
  </button>
</mat-dialog-actions>
